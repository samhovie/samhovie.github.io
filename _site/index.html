<script>


/*

  /* global d3 */

var currentWidth_rt = document.getElementById("rt_chart").offsetWidth

// set the dimensions and margins of the graph
var margin_rt = {top: 10, right: 30, bottom: 30, left: 60},
    width_rt = currentWidth_rt - margin_rt.left - margin_rt.right,
    height_rt = (currentWidth_rt * 0.5) - margin_rt.top - margin_rt.bottom;

// append the svg object to the body of the page
var svg_rt = d3.select("#rt_chart")
  .append("svg")
    .attr("width", width_rt + margin_rt.left + margin_rt.right)
    .attr("height", height_rt + margin_rt.top + margin_rt.bottom)
  .append("g")
    .attr("transform",
          "translate(" + margin_rt.left + "," + margin_rt.top + ")");


d3.json("/data/rt.json").then(function(data) {
    // filers NaN and converts strings
    let parseDate = d3.timeParse("%m/%d/%Y");
    data = data.filter(function(d){
      if(isNaN(d.rt_median)){
        return false;
      }
      d.rt_lower = +d.rt_lower;
      d.rt_median = +d.rt_median;
      d.rt_upper = +d.rt_upper;
      d.date = parseDate(d.date);
      return true;
    });
    
    console.log(data)

    // Add X axis --> it is a date format
    var x_rt = d3.scaleTime()
      .domain(d3.extent(data, function(d) { return d.date}))
      .range([ 0, width_rt ]);
    svg_rt.append("g")
      .attr("transform", "translate(0," + height_rt + ")")
      .call(d3.axisBottom(x_rt));

    // Add Y axis
    var y_rt = d3.scaleLinear()
      .domain([0, d3.max(data, function(d) { return d.rt_median; })])
      .range([ height_rt, 0 ]);
    svg_rt.append("g")
      .call(d3.axisLeft(y_rt));

    // Show confidence interval
    svg_rt.append("path")
      .datum(data.filter(function(d){return d.geography_modeled=="covidregion_1"}))
      .attr("fill", "#cce5df")
      .attr("stroke", "none")
      .attr("d", d3.area()
        .x(function(d) { return x_rt(d.date) })
        .y0(function(d) { return y_rt(d.rt_lower) })
        .y1(function(d) { return y_rt(d.rt_upper) })
        )

    // Add the line
    svg_rt
      .append("path")
      .datum(data.filter(function(d){return d.geography_modeled=="covidregion_1"}))
      .attr("fill", "none")
      .attr("stroke", "steelblue")
      .attr("stroke-width", 1.5)
      .attr("d", d3.line()
        .x(function(d) { return x_rt(d.date) })
        .y(function(d) { return y_rt(d.rt_median) })
        )

});

  
  var currentWidth_cd = document.getElementById("cases_chart").offsetWidth
  
  var margin_cases = {top: 10, right: 30, bottom: 30, left: 60},
      width_cases = currentWidth_cd - margin_cases.left - margin_cases.right,
      height_cases = (currentWidth_cd * 0.5) - margin_cases.top - margin_cases.bottom;
      
      // console.log(currentWidth_cd)
      // console.log(height_cases)
      
  var svg_cases = d3.select("#cases_chart")
    .append("svg")
      .attr("width", width_cases + margin_cases.left + margin_cases.right)
      .attr("height", height_cases + margin_cases.top + margin_cases.bottom)
    .append("g")
      .attr("transform",
            "translate(" + margin_cases.left + "," + margin_cases.top + ")");
            
            
  var margin_deaths = {top: 10, right: 30, bottom: 30, left: 40},
      width_deaths = currentWidth_cd - margin_deaths.left - margin_deaths.right,
      height_deaths = (currentWidth_cd * 0.5) - margin_deaths.top - margin_deaths.bottom;
      
  var svg_deaths = d3.select("#deaths_chart")
    .append("svg")
      .attr("width", width_deaths + margin_deaths.left + margin_deaths.right)
      .attr("height", height_deaths + margin_deaths.top + margin_deaths.bottom)
    .append("g")
      .attr("transform",
            "translate(" + margin_deaths.left + "," + margin_deaths.top + ")");    
            
      
  // let url = 'https://docs.google.com/spreadsheet/ccc?key=' + key + '&output=csv'
  let url = 'https://docs.google.com/spreadsheets/d/1MWNebArAjjTTtJdxQcnUakShSbADhccx3xw28L2Nflo/gviz/tq?tqx=out:csv'
  //Read the data
  d3.csv(url).then(function(data) {
    let parseDate = d3.timeParse("%m-%d-%Y");
    data.forEach((d) => { 
      d.update_date = parseDate(d.update_date);
      d.tests_pos = +d.tests_pos;
      d.deaths = +d.deaths;
      d.total_tests = +d.total_tests;
      d.tests_neg = +d.tests_neg;
      d.new_tests = +d.new_tests;
    });
    console.log(data);
    
    // Add X axis --> it is a date format
    var x_cases = d3.scaleTime()
      .domain(d3.extent(data, function(d) { return d.update_date; }))
      .range([ 0, width_cases ]);
    svg_cases.append("g")
      .attr("transform", "translate(0," + height_cases + ")")
      .call(d3.axisBottom(x_cases));

    // Add Y axis
    var y_cases = d3.scaleLinear()
      .domain([0, d3.max(data, function(d) { return d.tests_pos; })])
      .range([ height_cases, 0 ]);
    svg_cases.append("g")
      .call(d3.axisLeft(y_cases));

    // Add the area
    svg_cases.append("path")
      .datum(data)
      .attr("fill", "#cce5df")
      .attr("stroke", "#69b3a2")
      .attr("stroke-width", 1.5)
      .attr("d", d3.area()
        .x(function(d) { return x_cases(d.update_date) })
        .y0(y_cases(0))
        .y1(function(d) { return y_cases(d.tests_pos) })
        )
        
        // Add X axis --> it is a date format
    var x_deaths = d3.scaleTime()
      .domain(d3.extent(data, function(d) { return d.update_date; }))
      .range([ 0, width_deaths ]);
    svg_deaths.append("g")
      .attr("transform", "translate(0," + height_deaths + ")")
      .call(d3.axisBottom(x_deaths));

    // Add Y axis
    var y_deaths = d3.scaleLinear()
      .domain([0, d3.max(data, function(d) { return d.deaths; })])
      .range([ height_deaths, 0 ]);
    svg_deaths.append("g")
      .call(d3.axisLeft(y_deaths));

    // Add the area
    svg_deaths.append("path")
      .datum(data)
      .attr("fill", "#cce5df")
      .attr("stroke", "#69b3a2")
      .attr("stroke-width", 1.5)
      .attr("d", d3.area()
        .x(function(d) { return x_deaths(d.update_date) })
        .y0(y_deaths(0))
        .y1(function(d) { return y_deaths(d.deaths) })
        )   
        
  });
    

    


</script>
