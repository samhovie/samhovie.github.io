   d3.select(window)

	var projection = d3.geoAlbers()
	       .center([0, 38.82])
       .rotate([89.5,0])
		.scale(13000);

	var path = d3.geoPath()
		.projection(projection);

	var svg = d3.select("#cases_map")
		.append("svg")
    		.append("g");
	
	d3.json('https://raw.githubusercontent.com/samhovie/sitefiles/main/il-counties.json').then(function(data) {
	  svg.selectAll("path")
		.data(data.features)
	 .enter().append("path")
	 //initial fill function
	 .attr("fill", function(d){ 
	  //  console.log(countyMap[d.properties.COUNTY_NAM].covid_region )
	    return lightColors(allGroup[countyMap[d.properties.COUNTY_NAM].covid_region]) 
	 })
	 .attr("stroke", function(d){ 
	  //  console.log(countyMap[d.properties.COUNTY_NAM].covid_region )
	    return myColor(allGroup[countyMap[d.properties.COUNTY_NAM].covid_region]) 
	 })
	 .attr("stroke-width", "3px")
		.attr("class", "")
		.attr("d", path);
	});

	function sizeChange() {
	   
	   projection.translate([ 400, 1000]);
	    
	    d3.select("g")
	    .attr("transform", "scale(" + $("#cases_map").width()/900 + ")");
	    $("svg").height($("#cases_map").width()*1.618)
	    
	}
